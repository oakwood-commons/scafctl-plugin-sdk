syntax = "proto3";
package plugin;
option go_package = "github.com/oakwood-commons/scafctl-plugin-sdk/plugin/proto";

// PluginService is the provider plugin service.
service PluginService {
  // GetProviders returns all providers exposed by this plugin
  rpc GetProviders(GetProvidersRequest) returns (GetProvidersResponse);
  
  // GetProviderDescriptor returns metadata for a specific provider
  rpc GetProviderDescriptor(GetProviderDescriptorRequest) returns (GetProviderDescriptorResponse);
  
  // ConfigureProvider sends host-side configuration to a provider once after
  // plugin load. Providers store this internally for subsequent Execute calls.
  rpc ConfigureProvider(ConfigureProviderRequest) returns (ConfigureProviderResponse);

  // ExecuteProvider executes a provider
  rpc ExecuteProvider(ExecuteProviderRequest) returns (ExecuteProviderResponse);

  // ExecuteProviderStream executes a provider that produces incremental output.
  // The server sends zero or more OutputChunk messages followed by exactly one
  // Result message.
  rpc ExecuteProviderStream(ExecuteProviderRequest) returns (stream ExecuteProviderStreamChunk);

  // DescribeWhatIf returns a human-readable description of what the provider
  // would do with the given inputs, without executing.
  rpc DescribeWhatIf(DescribeWhatIfRequest) returns (DescribeWhatIfResponse);

  // ExtractDependencies returns resolver dependency names from the provider's
  // inputs. Called during dependency graph construction. Plugins that do not
  // implement custom extraction should return an empty list (the host falls
  // back to generic extraction).
  rpc ExtractDependencies(ExtractDependenciesRequest) returns (ExtractDependenciesResponse);

  // StopProvider requests graceful shutdown of a running provider execution.
  // The host calls this when the user cancels an operation (e.g. Ctrl+C).
  // Plugins should abort in-flight work and return promptly.
  rpc StopProvider(StopProviderRequest) returns (StopProviderResponse);
}

// HostService is a callback service that plugins can invoke on the host.
// The host registers this service via the go-plugin GRPCBroker, allowing
// plugins to access host-side resources that cannot be serialized.
service HostService {
  // GetSecret retrieves a secret value from the host's secret store.
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse);
  // SetSecret stores a secret value in the host's secret store.
  rpc SetSecret(SetSecretRequest) returns (SetSecretResponse);
  // DeleteSecret removes a secret from the host's secret store.
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse);
  // ListSecrets lists secret names from the host's secret store.
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse);

  // GetAuthIdentity retrieves identity claims from the host's auth registry.
  rpc GetAuthIdentity(GetAuthIdentityRequest) returns (GetAuthIdentityResponse);
  // ListAuthHandlers lists available auth handlers on the host.
  rpc ListAuthHandlers(ListAuthHandlersRequest) returns (ListAuthHandlersResponse);
  // GetAuthToken retrieves a valid access token from the host's auth registry.
  // Plugins use this for authenticated HTTP requests and token refresh on 401.
  rpc GetAuthToken(GetAuthTokenRequest) returns (GetAuthTokenResponse);
}

// AuthHandlerService is the auth handler plugin service.
service AuthHandlerService {
  // GetAuthHandlers returns metadata for all auth handlers exposed by this plugin.
  rpc GetAuthHandlers(GetAuthHandlersRequest) returns (GetAuthHandlersResponse);

  // ConfigureAuthHandler sends host-side configuration to the plugin once after load.
  rpc ConfigureAuthHandler(ConfigureAuthHandlerRequest) returns (ConfigureAuthHandlerResponse);

  // Login initiates authentication. Returns a stream: zero or more DeviceCodePrompt
  // messages followed by exactly one LoginResult message.
  rpc Login(LoginRequest) returns (stream LoginStreamMessage);

  // Logout clears stored credentials for the named handler.
  rpc Logout(LogoutRequest) returns (LogoutResponse);

  // GetStatus returns the current authentication status.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // GetToken returns a valid access token.
  rpc GetToken(GetTokenRequest) returns (GetTokenResponse);

  // ListCachedTokens enumerates cached tokens for the named handler.
  rpc ListCachedTokens(ListCachedTokensRequest) returns (ListCachedTokensResponse);

  // PurgeExpiredTokens removes expired tokens for the named handler.
  rpc PurgeExpiredTokens(PurgeExpiredTokensRequest) returns (PurgeExpiredTokensResponse);

  // StopAuthHandler requests graceful shutdown of a running auth handler operation.
  // handler_name may be empty to stop all handlers.
  rpc StopAuthHandler(StopAuthHandlerRequest) returns (StopAuthHandlerResponse);
}

message GetProvidersRequest {}

message GetProvidersResponse {
  repeated string provider_names = 1;
}

message GetProviderDescriptorRequest {
  string provider_name = 1;
}

message GetProviderDescriptorResponse {
  ProviderDescriptor descriptor = 1;
}

message ProviderDescriptor {
  string name = 1;
  string display_name = 2;
  string description = 3;
  string version = 4;
  string category = 5;
  repeated string capabilities = 6;
  Schema schema = 7;
  map<string, Schema> output_schemas = 8;
  string api_version = 9;
  reserved 10;
  reserved "mock_behavior";
  repeated string sensitive_fields = 11;
  repeated string tags = 12;
  string icon = 13;
  repeated Link links = 14;
  repeated Example examples = 15;
  repeated Contact maintainers = 16;
  bool deprecated = 17;
  bool beta = 18;
  bytes raw_schema = 19;
  map<string, bytes> raw_output_schemas = 20;
  bool has_extract_dependencies = 21;
}

message Link {
  string name = 1;
  string url = 2;
}

message Example {
  string name = 1;
  string description = 2;
  string yaml = 3;
}

message Contact {
  string name = 1;
  string email = 2;
}

message Schema {
  map<string, Parameter> parameters = 1;
}

message Parameter {
  string type = 1;
  bool required = 2;
  string description = 3;
  bytes default_value = 4;
  string example = 5;
  int32 max_length = 6;
  string pattern = 7;
  string pattern_description = 8;
  int32 min_length = 9;
  double minimum = 10;
  double maximum = 11;
  double exclusive_minimum = 12;
  double exclusive_maximum = 13;
  repeated bytes enum_values = 14;
  string format = 15;
  int32 min_items = 16;
  int32 max_items = 17;
  bool has_minimum = 18;
  bool has_maximum = 19;
  bool has_exclusive_minimum = 20;
  bool has_exclusive_maximum = 21;
}

message ExecuteProviderRequest {
  string provider_name = 1;
  bytes input = 2;
  bytes context = 3;
  bool dry_run = 4;
  string execution_mode = 5;
  string working_directory = 6;
  string output_directory = 7;
  string conflict_strategy = 8;
  bool backup = 9;
  IterationContext iteration_context = 10;
  bytes parameters = 11;
  SolutionMeta solution_metadata = 12;
}

message ConfigureProviderRequest {
  string provider_name = 1;
  bool quiet = 2;
  bool no_color = 3;
  string binary_name = 4;
  uint32 host_service_id = 5;
  map<string, bytes> settings = 6;
  int32 protocol_version = 7;
}

message ConfigureProviderResponse {
  string error = 1;
  repeated Diagnostic diagnostics = 2;
  int32 protocol_version = 3;
}

message SolutionMeta {
  string name = 1;
  string version = 2;
  string display_name = 3;
  string description = 4;
  string category = 5;
  repeated string tags = 6;
}

message IterationContext {
  bytes item = 1;
  int32 index = 2;
  string item_alias = 3;
  string index_alias = 4;
}

message ExecuteProviderStreamChunk {
  oneof chunk {
    bytes stdout = 1;
    bytes stderr = 2;
    ExecuteProviderResponse result = 3;
  }
}

message Diagnostic {
  enum Severity {
    INVALID = 0;
    ERROR = 1;
    WARNING = 2;
  }
  Severity severity = 1;
  string summary = 2;
  string detail = 3;
  string attribute = 4;
}

message ExecuteProviderResponse {
  bytes output = 1;
  string error = 2;
  int32 exit_code = 3;
  repeated Diagnostic diagnostics = 4;
}

message DescribeWhatIfRequest {
  string provider_name = 1;
  bytes input = 2;
}

message DescribeWhatIfResponse {
  string description = 1;
  string error = 2;
  repeated Diagnostic diagnostics = 3;
}

message ExtractDependenciesRequest {
  string provider_name = 1;
  bytes inputs = 2;
}

message ExtractDependenciesResponse {
  repeated string dependencies = 1;
  string error = 2;
  repeated Diagnostic diagnostics = 3;
}

message StopProviderRequest {
  string provider_name = 1;
}

message StopProviderResponse {
  string error = 1;
}

// ---- Auth Handler Messages ----

message GetAuthHandlersRequest {}

message GetAuthHandlersResponse {
  repeated AuthHandlerInfo handlers = 1;
}

message AuthHandlerInfo {
  string name = 1;
  string display_name = 2;
  repeated string flows = 3;
  repeated string capabilities = 4;
}

message LoginRequest {
  string handler_name = 1;
  string tenant_id = 2;
  repeated string scopes = 3;
  string flow = 4;
  int64 timeout_seconds = 5;
}

message LoginStreamMessage {
  oneof payload {
    DeviceCodePrompt device_code_prompt = 1;
    LoginResult result = 2;
    string error = 3;
  }
}

message DeviceCodePrompt {
  string user_code = 1;
  string verification_uri = 2;
  string message = 3;
}

message LoginResult {
  Claims claims = 1;
  int64 expires_at_unix = 2;
}

message Claims {
  string issuer = 1;
  string subject = 2;
  string tenant_id = 3;
  string object_id = 4;
  string client_id = 5;
  string email = 6;
  string name = 7;
  string username = 8;
  int64 issued_at_unix = 9;
  int64 expires_at_unix = 10;
}

message LogoutRequest {
  string handler_name = 1;
}

message LogoutResponse {}

message GetStatusRequest {
  string handler_name = 1;
}

message GetStatusResponse {
  bool authenticated = 1;
  Claims claims = 2;
  int64 expires_at_unix = 3;
  int64 last_refresh_unix = 4;
  string tenant_id = 5;
  string identity_type = 6;
  string client_id = 7;
  string token_file = 8;
  repeated string scopes = 9;
  string reason = 10;
}

message GetTokenRequest {
  string handler_name = 1;
  string scope = 2;
  int64 min_valid_for_seconds = 3;
  bool force_refresh = 4;
}

message GetTokenResponse {
  string access_token = 1;
  string token_type = 2;
  int64 expires_at_unix = 3;
  string scope = 4;
  int64 cached_at_unix = 5;
  string flow = 6;
  string session_id = 7;
}

message ListCachedTokensRequest {
  string handler_name = 1;
}

message ListCachedTokensResponse {
  repeated CachedTokenInfo tokens = 1;
}

message CachedTokenInfo {
  string handler = 1;
  string token_kind = 2;
  string scope = 3;
  string token_type = 4;
  string flow = 5;
  int64 expires_at_unix = 6;
  int64 cached_at_unix = 7;
  bool is_expired = 8;
  string session_id = 9;
  string fingerprint = 10;
}

message PurgeExpiredTokensRequest {
  string handler_name = 1;
}

message PurgeExpiredTokensResponse {
  int32 purged_count = 1;
}

message ConfigureAuthHandlerRequest {
  string handler_name = 1;
  bool   quiet = 2;
  bool   no_color = 3;
  string binary_name = 4;
  map<string, bytes> settings = 5;
  uint32 host_service_id = 6;
  int32  protocol_version = 7;
}

message ConfigureAuthHandlerResponse {
  string error = 1;
  int32  protocol_version = 2;
  repeated Diagnostic diagnostics = 3;
}

message StopAuthHandlerRequest {
  string handler_name = 1;
}

message StopAuthHandlerResponse {
  string error = 1;
}

// ---- Host Service Messages (plugin → host callbacks) ----

message GetSecretRequest {
  string name = 1;
}

message GetSecretResponse {
  string value = 1;
  bool found = 2;
  string error = 3;
}

message SetSecretRequest {
  string name = 1;
  string value = 2;
}

message SetSecretResponse {
  string error = 1;
}

message DeleteSecretRequest {
  string name = 1;
}

message DeleteSecretResponse {
  string error = 1;
}

message ListSecretsRequest {
  string pattern = 1;
}

message ListSecretsResponse {
  repeated string names = 1;
  string error = 2;
}

message GetAuthIdentityRequest {
  string handler_name = 1;
  string scope = 2;
}

message GetAuthIdentityResponse {
  Claims claims = 1;
  string error = 2;
}

message ListAuthHandlersRequest {}

message ListAuthHandlersResponse {
  repeated string handler_names = 1;
  string default_handler = 2;
}

message GetAuthTokenRequest {
  string handler_name = 1;
  string scope = 2;
  int64 min_valid_for_seconds = 3;
  bool force_refresh = 4;
}

message GetAuthTokenResponse {
  string access_token = 1;
  string token_type = 2;
  int64 expires_at_unix = 3;
  string scope = 4;
  string error = 5;
}
